name = "dietie-telegram-bot"
main = "src/index.ts"
compatibility_date = "2025-12-01"

# بعد از ساخت D1 در Cloudflare، مقدار database_id را با ID واقعی عوض کن.
# اگر اسم Worker را در داشبورد Cloudflare تغییر دادی، مقدار name بالا هم باید همان شود.
[[d1_databases]]
binding = "DB"
database_name = "dietie_bot_db"
database_id = "2b570ce3-5122-457e-b58e-0654ae8ed89b"

[observability]
enabled = true
